<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Memory Display Spotify Callback</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 32px;
      color: #172033;
      line-height: 1.7;
    }
    code {
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Spotify認証を戻しています</h1>
  <p id="status">Memory Displayへ転送しています...</p>
  <p id="manual" hidden>自動で切り替わらない場合は、下のリンクを開いてください。<br><a id="link" href="#">Memory Displayへ戻る</a></p>

  <script>
    const statusEl = document.getElementById("status");
    const manualEl = document.getElementById("manual");
    const linkEl = document.getElementById("link");
    const params = new URLSearchParams(location.search);

    function decodeBase64Url(input) {
      let value = input.replace(/-/g, "+").replace(/_/g, "/");
      while (value.length % 4) value += "=";
      const binary = atob(value);
      const bytes = [];
      for (let i = 0; i < binary.length; i++) {
        bytes.push("%" + binary.charCodeAt(i).toString(16).padStart(2, "0"));
      }
      return decodeURIComponent(bytes.join(""));
    }

    try {
      const state = params.get("state") || "";
      const splitAt = state.indexOf("~");
      if (splitAt < 0) throw new Error("stateに戻り先情報がありません");

      const callbackText = decodeBase64Url(state.slice(splitAt + 1));
      const callbackUrl = new URL(callbackText);
      if (callbackUrl.protocol !== "http:" || callbackUrl.pathname !== "/spotifyCallback") {
        throw new Error("戻り先URLが不正です");
      }

      ["code", "state", "error"].forEach((key) => {
        const value = params.get(key);
        if (value) callbackUrl.searchParams.set(key, value);
      });

      linkEl.href = callbackUrl.toString();
      manualEl.hidden = false;
      location.replace(callbackUrl.toString());
    } catch (err) {
      statusEl.textContent = "Memory Displayへ転送できませんでした: " + err.message;
    }
  </script>
</body>
</html>
